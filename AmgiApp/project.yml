name: AmgiApp
options:
  bundleIdPrefix: com.amgiapp
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  defaultSourceDirectoryType: syncedFolder
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
packages:
  AnkiBridge:
    path: ..
  AmgiUI:
    path: ../AmgiUI
  AmgiReader:
    path: ../AmgiReader
  swift-navigation:
    url: https://github.com/pointfreeco/swift-navigation
    from: 2.0.0
  swift-sharing:
    url: https://github.com/pointfreeco/swift-sharing
    from: 2.0.0
schemes:
  AmgiApp:
    build:
      targets:
        AmgiApp: all
        AmgiWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AmgiAppTests
  AmgiWatchApp:
    build:
      targets:
        AmgiWatchApp: all
    run:
      config: Debug
targets:
  AmgiApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/Browse
      - path: Sources/Decks
      - path: Sources/Reader
      - path: Sources/Review
      - path: Sources/Settings
      - path: Sources/Shared
      - path: Sources/Stats
      - path: Sources/Sync
      - path: Sources/Theme
      - path: Sources/AmgiAppApp.swift
      - path: Sources/ContentView.swift
      - path: Sources/DebugView.swift
      - path: Sources/WriteWidgetSnapshot.swift
      - path: Assets.xcassets
      - path: Resources/mathjax
        type: folder
      - path: Resources/Review
        type: folder
      - path: Resources/Fonts
        type: folder
    dependencies:
      - package: AnkiBridge
        product: AnkiKit
      - package: AnkiBridge
        product: AnkiServices
      - package: AnkiBridge
        product: AnkiClients
      - package: AnkiBridge
        product: AnkiSync
      - package: AnkiBridge
        product: AnkiBackend
      - package: AnkiBridge
        product: AnkiProto
      - package: AnkiBridge
        product: AmgiCardWeb
      - package: AmgiReader
        product: AmgiReader
      - package: AmgiReader
        product: AmgiReaderDictionary
      - package: AmgiUI
        product: AmgiTheme
      - package: swift-navigation
        product: SwiftNavigation
      - package: swift-navigation
        product: UIKitNavigation
      - package: swift-sharing
        product: Sharing
      - sdk: WidgetKit.framework
      - target: AmgiWidget
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.amgiapp.AmgiApp
        CODE_SIGN_ENTITLEMENTS: AmgiApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Cxx interop chain. The app imports AmgiReaderDictionary, which
        # is built with .interoperabilityMode(.Cxx) for the hoshidicts
        # bridge. Xcode + SPM under Swift 6 needs an explicit Clang C++
        # standard alongside SWIFT_CXX_INTEROPERABILITY_MODE — without
        # the language-standard hint Clang's dependency scanner rejects
        # the CHoshiDicts modulemap's `requires cplusplus`.
        SWIFT_CXX_INTEROPERABILITY_MODE: default
        CLANG_CXX_LANGUAGE_STANDARD: "c++20"
        CLANG_CXX_LIBRARY: "libc++"
        OTHER_SWIFT_FLAGS: "$(inherited) -cxx-interoperability-mode=default"

  AmgiWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widgets
      - path: Sources/Shared/WidgetSnapshot.swift
      - path: Sources/Shared/WidgetSnapshotStore.swift
    dependencies:
      - package: AnkiBridge
        product: AnkiKit
      - package: AmgiUI
        product: AmgiTheme
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amgiapp.AmgiApp.widget
        INFOPLIST_FILE: Sources/Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: AmgiWidget.entitlements

  AmgiWatchApp:
    type: application
    platform: watchOS
    sources:
      - path: Sources/Watch
        type: group
      - path: Sources/Shared
        type: group
        excludes:
          - ShareSheet.swift
          - CardContextMenu.swift
          - TagsView.swift
      - path: Sources/Theme/AmgiSpacing.swift
      - path: Sources/Theme/AmgiTypography.swift
      - path: Sources/Decks
        type: group
        excludes:
          - DeckListView.swift
          - DeckDetailView.swift
          - DeckTemplateListView.swift
          - TemplateSourceEditor.swift
      - path: Sources/Review
        type: group
        excludes:
          - ReviewView.swift
          - CardAssetScheme.swift
          - CardWebView.swift
      - path: Sources/Stats/PeriodPicker.swift
      - path: Sources/Stats/TodayStatsCard.swift
      - path: Sources/Stats/FutureDueChart.swift
      - path: Sources/Stats/ReviewsChart.swift
      - path: Sources/Stats/CardCountsChart.swift
      - path: Sources/Stats/IntervalsChart.swift
      - path: Sources/Stats/EaseChart.swift
      - path: Sources/Stats/HourlyChart.swift
      - path: Sources/Stats/ButtonsChart.swift
      - path: Sources/Stats/AddedChart.swift
      - path: Sources/Stats/RetentionChart.swift
    dependencies:
      - package: AnkiBridge
        product: AnkiKit
      - package: AmgiUI
        product: AmgiTheme
      - package: AnkiBridge
        product: AnkiServices
      - package: AnkiBridge
        product: AnkiClients
      - package: AnkiBridge
        product: AnkiSync
      - package: AnkiBridge
        product: AnkiBackend
      - package: AnkiBridge
        product: AnkiProto
      - package: swift-navigation
        product: SwiftNavigation
      - package: swift-sharing
        product: Sharing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amgiapp.AmgiApp.watch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.amgiapp.AmgiApp

  AmgiAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/AmgiAppTests
    dependencies:
      - target: AmgiApp
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/AmgiApp.app/AmgiApp
        PRODUCT_BUNDLE_IDENTIFIER: com.amgiapp.AmgiAppTests
        GENERATE_INFOPLIST_FILE: YES
        # Tests inherit @testable AmgiApp's transitive Cxx-mode import
        # of AmgiReaderDictionary, so they need the same Clang+Swift
        # interop flags as the app target.
        SWIFT_CXX_INTEROPERABILITY_MODE: default
        CLANG_CXX_LANGUAGE_STANDARD: "c++20"
        CLANG_CXX_LIBRARY: "libc++"
        OTHER_SWIFT_FLAGS: "$(inherited) -cxx-interoperability-mode=default"
