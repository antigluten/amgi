name: AnkiApp
options:
  bundleIdPrefix: com.ankiapp
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
packages:
  AnkiBridge:
    path: ..
schemes:
  AnkiApp:
    build:
      targets:
        AnkiApp: all
    run:
      config: Debug
targets:
  AnkiApp:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: AnkiBridge
        product: AnkiKit
      - package: AnkiBridge
        product: AnkiClients
      - package: AnkiBridge
        product: AnkiSync
      - package: AnkiBridge
        product: AnkiBackend
      - package: AnkiBridge
        product: AnkiProto
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ankiapp.AnkiApp
